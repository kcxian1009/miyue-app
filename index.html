function calcCezi(items) {
  const orig = items.reduce((s,i)=>s+i.price*i.qty,0);
  let rate=1, label="未達折扣門檻";
  if(orig>=30000){rate=0.88;label="滿$30000 → 88折";}
  else if(orig>=20000){rate=0.90;label="滿$20000 → 9折";}
  else if(orig>=10000){rate=0.92;label="滿$10000 → 92折";}
  else if(orig>=5000){rate=0.95;label="滿$5000 → 95折";}
  const afterRate=Math.round(orig*rate);
  const sq=items.filter(i=>i.tier==="single").reduce((s,i)=>s+i.qty,0);
  const dq=items.filter(i=>i.tier==="double").reduce((s,i)=>s+i.qty,0);
  const final=afterRate-sq*10-dq*20;
  return {orig,afterRate,final,saved:orig-final,label,sq,dq,rate};
}

function calcShiyue(items) {
  const qty=items.reduce((s,i)=>s+i.qty,0);
  const orig=items.reduce((s,i)=>s+i.price*i.qty,0);
  if(qty<20) return{orig,final:orig,saved:0,freeQty:0,qty,ok:false,freeVal:0};
  const freeQty=Math.floor(qty/10);
  const minP=Math.min(...items.map(i=>i.price));
  const freeVal=freeQty*minP;
  return{orig,final:orig-freeVal,saved:freeVal,freeQty,qty,ok:true,freeVal,minP};
}

function fromLS(){
  try{
    const r=localStorage.getItem(LS_KEY);
    if(!r) return DEFAULT_LIST;
    const p=JSON.parse(r);
    return Array.isArray(p)&&p.length>0?p:DEFAULT_LIST;
  }catch{return DEFAULT_LIST;}
}

            <div style={S.filterBar}>
              {["全部","子賢","凱西"].map(o=>{
                const count=o==="全部"?list.length:list.filter(p=>p.category.startsWith(o)).length;
                const active=ownerFilter===o;
                const color=o==="子賢"?"#5B86C0":o==="凱西"?"#C06B8A":"#C8956C";
                return(
                  <button key={o} onClick={()=>setOwnerFilter(o)}
                    style={{...S.filterBtn,backgroundColor:active?color:"#fff",color:active?"#fff":color,borderColor:color}}>
                    {o==="全部"?"👥 全部":o==="子賢"?"💙 子賢":"💗 凱西"}
                    <span style={{...S.filterBadge,backgroundColor:active?"rgba(255,255,255,0.25)":color+"18",color:active?"#fff":color}}>
                      {count}
                    </span>
                  </button>
                );
              })}
            </div>

            {list.length===0&&(
              <div style={{textAlign:"center",color:"#C0A898",padding:"60px 0 40px",fontSize:15}}>
                <div style={{fontSize:40,marginBottom:12}}>🎀</div>
                還沒有名單，點右下角 ＋ 開始新增
              </div>
            )}

            {ownerFilter==="全部"?(
              list.map((p,i)=>(
                <ListRow key={p.id} p={p} i={i}
                  onEdit={()=>openEdit(p.id)} onDel={()=>confirmDel(p.id)} canDel={list.length>1}/>
              ))
            ):(
              ["親戚","同事","朋友"].map(type=>{
                const subList=list.filter(p=>p.category===ownerFilter+"-"+type);
                if(subList.length===0) return null;
                const catColor=ownerFilter==="子賢"?"#5B86C0":"#C06B8A";
                return(
                  <div key={type} style={{marginBottom:4}}>
                    <div style={{...S.groupLabel,color:catColor,borderColor:catColor+"30"}}>
                      <span style={{display:"inline-block",backgroundColor:catColor,color:"#fff",borderRadius:10,padding:"2px 10px",fontSize:12,marginRight:8}}>
                        {ownerFilter}-{type}
                      </span>
                      <span style={{fontSize:13,color:"#A09080"}}>{subList.length} 人</span>
                    </div>
                    {subList.map(p=>{
                      const realIdx=list.indexOf(p);
                      return(
                        <ListRow key={p.id} p={p} i={realIdx}
                          onEdit={()=>openEdit(p.id)} onDel={()=>confirmDel(p.id)} canDel={list.length>1}/>
                      );
                    })}
                  </div>
                );
              })
            )}
            <div style={{height:80}}/>
          </>
        ):(
          <Summary shopItems={shopItems} list={list} ceziC={ceziC} shiyueC={shiyueC} snfTotal={snfTotal} gOrig={gOrig} gFinal={gFinal}/>
        )}
      </main>

      {tab==="list"&&(
        <button style={S.fab} onClick={openAdd}>＋</button>
      )}

      {modal&&draft&&(
        <div style={S.overlay} onClick={closeModal}>
          <div style={S.modalBox} onClick={e=>e.stopPropagation()}>
            <div style={S.modalH}>
              <span style={S.modalTitle}>{modal.mode==="add"?"✨ 新增名單":"✏️ 編輯名單"}</span>
              <button style={S.modalClose} onClick={closeModal}>✕</button>
            </div>
            <div style={S.modalBody}><CardForm p={draft} upd={updDraft}/></div>
            <div style={S.modalFoot}>
              <button style={S.cancelBtn} onClick={closeModal}>取消</button>
              <button style={S.saveBtn} onClick={saveDraft}>{modal.mode==="add"?"＋ 新增":"✓ 儲存"}</button>
            </div>
          </div>
        </div>
      )}

      {/* 刪除確認彈窗 */}
      {deleteTarget&&(
        <div style={S.overlay} onClick={()=>setDeleteTarget(null)}>
          <div style={{...S.modalBox,maxHeight:"auto"}} onClick={e=>e.stopPropagation()}>
            <div style={S.modalH}>
              <span style={S.modalTitle}>🗑 確認刪除</span>
              <button style={S.modalClose} onClick={()=>setDeleteTarget(null)}>✕</button>
            </div>
            <div style={{padding:"24px 20px",textAlign:"center"}}>
              <div style={{fontSize:40,marginBottom:12}}>⚠️</div>
              <p style={{fontSize:15,color:"#4A3728",margin:"0 0 6px",lineHeight:1.6}}>
                請問要刪除
              </p>
              <p style={{fontSize:18,fontWeight:700,color:"#C0392B",margin:"0 0 16px"}}>
                「{deleteTarget.name}」
              </p>
              <p style={{fontSize:13,color:"#A09080",margin:0}}>
                刪除後無法復原
              </p>
            </div>
            <div style={S.modalFoot}>
              <button style={S.cancelBtn} onClick={()=>setDeleteTarget(null)}>取消</button>
              <button style={{...S.saveBtn,backgroundColor:"#C0392B"}} onClick={doDel}>確認刪除</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function ListRow({p,i,onEdit,onDel,canDel}){
  const shop=SHOPS[p.shop];
  const prod=shop?.products.find(pp=>pp.name===p.product);
  const qty=p.qty||1;
  const S=styles;
  const shopColor=shop?.color||"#CCC";
  const [owner]=p.category.split("-");
  const catColor=owner==="子賢"?"#5B86C0":"#C06B8A";
  const incomplete=!p.name||!p.shop||!p.product;
  return(
    <div style={{...S.listRow,borderLeft:"3px solid "+(incomplete?"#F5C69A":shopColor)}} onClick={onEdit}>
      <div style={{display:"flex",alignItems:"center",gap:10,flex:1,minWidth:0}}>
        <span style={{fontSize:12,color:"#C0A898",fontWeight:600,flexShrink:0}}>#{i+1}</span>
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
            <span style={{fontWeight:700,fontSize:14,color:incomplete?"#C0A898":"#3D2E22"}}>
              {p.name||"（未填姓名）"}
            </span>
            <span style={{display:"inline-block",backgroundColor:catColor+"22",color:catColor,borderRadius:8,padding:"1px 7px",fontSize:11,fontWeight:600}}>{p.category}</span>
            {p.delivery&&<span style={{display:"inline-block",padding:"1px 7px",borderRadius:8,fontSize:11,fontWeight:600,backgroundColor:p.delivery==="宅配"?"#EAF0FA":"#EDF6F0",color:p.delivery==="宅配"?"#5B86C0":"#6B9E78"}}>{p.delivery==="宅配"?"📦":"🤝"} {p.delivery}</span>}
          </div>
          <div style={{fontSize:12,color:"#9A8878",marginTop:3}}>
            {p.shop
              ?<><span style={{color:shopColor,fontWeight:600}}>{p.shop}</span>{p.product?" · "+p.product+(qty>1?" × "+qty:""):""}</>
              :<span style={{color:"#DDD"}}>尚未選擇店家與產品</span>
            }
            {prod&&<span style={{marginLeft:8,color:"#C8956C",fontWeight:600}}>${(prod.price*qty).toLocaleString()}</span>}
          </div>
          {p.note&&<div style={{fontSize:11,color:"#B8A898",marginTop:2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>📝 {p.note}</div>}
        </div>
      </div>
      <div style={{display:"flex",gap:4,flexShrink:0}} onClick={e=>e.stopPropagation()}>
        <button style={S.editBtn} onClick={onEdit}>✏️</button>
        {canDel&&<button style={S.delBtn2} onClick={onDel}>🗑</button>}
      </div>
    </div>
  );
}

    <div>

              <button key={d} onClick={()=>upd("delivery",p.delivery===d?"":d)}

                  borderColor:p.delivery===d?(d==="宅配"?"#5B86C0":"#6B9E78"):"#E8E0D8",

function Summary({shopItems,list,ceziC,shiyueC,snfTotal,gOrig,gFinal}){
  const filled=list.filter(p=>p.name&&p.shop&&p.product);
  const saved=gOrig-gFinal;
  const S=styles;
  return(
    <div>
      {ceziC&&(
        <ShopCard shopName="冊子" items={shopItems["冊子"]}>
          <div style={S.dd}>
            <div style={S.ddT}>🏷️ 優惠明細</div>
            <Row l="原價合計" r={`$${ceziC.orig.toLocaleString()}`}/>
            <Row l={ceziC.label} r={ceziC.rate<1?`－$${(ceziC.orig-ceziC.afterRate).toLocaleString()}`:"—"} rStyle={ceziC.rate<1?S.red:S.gray}/>
            {ceziC.sq>0&&<Row l={`單層折扣（${ceziC.sq} 盒×$10）`} r={`－$${(ceziC.sq*10).toLocaleString()}`} rStyle={S.red}/>}
            {ceziC.dq>0&&<Row l={`雙層折扣（${ceziC.dq} 盒×$20）`} r={`－$${(ceziC.dq*20).toLocaleString()}`} rStyle={S.red}/>}
            <Row l="折扣後實付" r={`$${ceziC.final.toLocaleString()}`} bold rStyle={S.green}/>
            {ceziC.saved>0&&<div style={S.badge}>🎉 共省 ${ceziC.saved.toLocaleString()}</div>}
            {ceziC.orig<5000&&<div style={S.hint}>💡 再訂 ${(5000-ceziC.orig).toLocaleString()} 可達 95折</div>}
          </div>
        </ShopCard>
      )}
      {snfTotal>0&&(()=>{
        const snfQty=Object.values(shopItems["四月南風"]).reduce((s,v)=>s+v.qty,0);
        const cardFree=snfTotal>=6000;
        const cardCost=cardFree?0:snfQty*3;
        const snfFinal=snfTotal+cardCost;
        return(
          <ShopCard shopName="四月南風" items={shopItems["四月南風"]}>
            <div style={S.dd}>
              <div style={S.ddT}>🏷️ 費用明細</div>
              <Row l="原價合計" r={`$${snfTotal.toLocaleString()}`}/>
              {cardFree?(
                <Row l={`彌月卡 ${snfQty} 張（滿$6000免費）`} r="免費" rStyle={S.green}/>
              ):(
                <>
                  <Row l={`彌月卡 ${snfQty} 張 × $3`} r={`＋$${cardCost}`} rStyle={{color:"#B07A00",fontWeight:600}}/>
                  {snfTotal<6000&&<div style={S.hint}>💡 再訂 ${(6000-snfTotal).toLocaleString()} 可達 $6000，彌月卡免費</div>}
                </>
              )}
              <Row l="實付合計" r={`$${snfFinal.toLocaleString()}`} bold rStyle={S.green}/>
            </div>
          </ShopCard>
        );
      })()}
      {shiyueC&&(
        <ShopCard shopName="十月甜" items={shopItems["十月甜"]}>
          <div style={S.dd}>
            <div style={S.ddT}>🏷️ 優惠明細</div>
            <Row l="總盒數" r={`${shiyueC.qty} 盒`}/>
            <Row l="原價合計" r={`$${shiyueC.orig.toLocaleString()}`}/>
            {!shiyueC.ok
              ?<div style={S.hint}>💡 需滿 20 盒才享優惠，還差 {20-shiyueC.qty} 盒</div>
              :<>
                <Row l={`每10盒送1盒（$${shiyueC.minP} 最低價）× ${shiyueC.freeQty} 盒`} r={`－$${shiyueC.freeVal.toLocaleString()}`} rStyle={S.red}/>
                <Row l="折扣後實付" r={`$${shiyueC.final.toLocaleString()}`} bold rStyle={S.green}/>
                <div style={S.badge}>🎉 等效省 ${shiyueC.saved.toLocaleString()}（送 {shiyueC.freeQty} 盒）</div>
              </>
            }
          </div>
        </ShopCard>
      )}
      {SHOP_NAMES.map(sn=>{
        const sp=filled.filter(p=>p.shop===sn);
        if(sp.length===0)return null;
        const sc=SHOPS[sn].color, sb=SHOPS[sn].bg;
        const sOrig=sp.reduce((s,p)=>{const pr=SHOPS[sn]?.products.find(pp=>pp.name===p.product);return s+(pr?pr.price*(p.qty||1):0);},0);
        const sQty=sp.reduce((s,p)=>s+(p.qty||1),0);
        return(
          <div key={sn} style={{...S.sCard,borderColor:sc}}>
            <div style={{...S.sH,backgroundColor:sc}}>
              <span style={S.sHN}>📋 {sn}　名單明細</span>
              <span style={S.sHS}>共 {sp.length} 人　{sQty} 份　原價 ${sOrig.toLocaleString()}</span>
            </div>
            <table style={S.tbl}>
              <thead><tr style={S.thead}>
                <th style={S.th}>#</th><th style={S.th}>姓名</th><th style={S.th}>類別</th>
                <th style={S.th}>產品</th><th style={{...S.th,textAlign:"center"}}>數量</th>
                <th style={{...S.th,textAlign:"center"}}>寄送</th>
                <th style={{...S.th,textAlign:"right"}}>原價</th><th style={S.th}>備註</th>
              </tr></thead>
              <tbody>
                {(()=>{
                  let idx=0;
                  return CATEGORIES.map(cat=>{
                    const cp=sp.filter(p=>p.category===cat);
                    if(cp.length===0)return null;
                    const [ow]=cat.split("-");
                    const cc=ow==="子賢"?"#5B86C0":"#C06B8A";
                    const ct=cp.reduce((s,p)=>{const pr=SHOPS[sn]?.products.find(pp=>pp.name===p.product);return s+(pr?pr.price*(p.qty||1):0);},0);
                    return[
                      <tr key={"g"+sn+cat} style={{backgroundColor:cc+"14"}}>
                        <td colSpan={6} style={{...S.td,padding:"7px 10px",fontSize:12,color:cc,fontWeight:700}}>
                          <span style={{display:"inline-block",backgroundColor:cc,color:"#fff",borderRadius:10,padding:"1px 9px",fontSize:11,marginRight:6}}>{cat}</span>
                          {cp.reduce((s,p)=>s+(p.qty||1),0)} 份
                        </td>
                        <td style={{...S.td,textAlign:"right",color:cc,fontWeight:700,fontSize:12,padding:"7px 10px"}}>${ct.toLocaleString()}</td>
                        <td style={S.td}></td>
                      </tr>,
                      ...cp.map((p,ii)=>{
                        idx++;
                        const pr=SHOPS[sn]?.products.find(pp=>pp.name===p.product);
                        const amt=pr?pr.price*(p.qty||1):0;
                        return(
                          <tr key={p.id} style={ii%2===0?S.tr:{...S.tr,backgroundColor:sb+"88"}}>
                            <td style={{...S.td,color:"#ccc",fontSize:11}}>{idx}</td>
                            <td style={{...S.td,fontWeight:600}}>{p.name}</td>
                            <td style={S.td}><span style={{display:"inline-block",backgroundColor:cc+"20",color:cc,borderRadius:8,padding:"1px 7px",fontSize:11,fontWeight:600}}>{cat}</span></td>
                            <td style={S.td}>{p.product}</td>
                            <td style={{...S.td,textAlign:"center"}}>{p.qty||1}</td>
                            <td style={{...S.td,textAlign:"center"}}>
                              {p.delivery?<span style={{display:"inline-block",padding:"1px 8px",borderRadius:8,fontSize:11,fontWeight:600,backgroundColor:p.delivery==="宅配"?"#EAF0FA":"#EDF6F0",color:p.delivery==="宅配"?"#5B86C0":"#6B9E78"}}>{p.delivery==="宅配"?"📦 宅配":"🤝 親送"}</span>:<span style={{color:"#DDD"}}>—</span>}
                            </td>
                            <td style={{...S.td,textAlign:"right"}}>${amt.toLocaleString()}</td>
                            <td style={{...S.td,color:"#999",fontSize:11,whiteSpace:"pre-wrap",maxWidth:110}}>{p.note}</td>
                          </tr>
                        );
                      })
                    ];
                  });
                })()}
              </tbody>
            </table>
          </div>
        );
      })}
      <div style={S.gtBox}>
        <div style={S.gtR}><span style={S.gtL}>原價總計</span><span style={S.gtOrig}>${gOrig.toLocaleString()}</span></div>
        {saved>0&&<div style={S.gtR}><span style={S.gtL}>優惠折抵</span><span style={S.gtSaved}>－${saved.toLocaleString()}</span></div>}
        <div style={{...S.gtR,borderTop:"1px solid rgba(255,255,255,0.2)",paddingTop:10,marginTop:6}}>
          <span style={{...S.gtL,fontSize:16,fontWeight:700}}>🎀 實付總計</span>
          <span style={S.gtFinal}>${gFinal.toLocaleString()}</span>
        </div>
      </div>
    </div>
  );
}

function ShopCard({shopName,items,children}){
  const shop=SHOPS[shopName];
  const rows=Object.entries(items);
  const qty=rows.reduce((s,[,v])=>s+v.qty,0);
  const orig=rows.reduce((s,[,v])=>s+v.price*v.qty,0);
  const S=styles;
  return(
    <div style={{...S.sCard,borderColor:shop.color}}>
      <div style={{...S.sH,backgroundColor:shop.color}}>
        <span style={S.sHN}>{shopName}</span>
        <span style={S.sHS}>共 {qty} 份　原價 ${orig.toLocaleString()}</span>
      </div>
      <table style={S.tbl}>
        <thead><tr style={S.thead}>
          <th style={S.th}>產品名稱</th>
          <th style={{...S.th,textAlign:"center"}}>單價</th>
          <th style={{...S.th,textAlign:"center"}}>數量</th>
          <th style={{...S.th,textAlign:"right"}}>小計</th>
        </tr></thead>
        <tbody>
          {rows.map(([n,{price,qty:q}])=>(
            <tr key={n} style={S.tr}>
              <td style={S.td}>{n}</td>
              <td style={{...S.td,textAlign:"center"}}>${price}</td>
              <td style={{...S.td,textAlign:"center"}}>{q}</td>
              <td style={{...S.td,textAlign:"right",fontWeight:600}}>${(price*q).toLocaleString()}</td>
            </tr>
          ))}
        </tbody>
      </table>
      {children}
    </div>
  );
}

function Row({l,r,bold,rStyle}){
  return(
    <div style={styles.ddRow}>
      <span>{l}</span>
      <span style={{...rStyle,...(bold?{fontWeight:700,fontSize:14}:{})}}>{r}</span>
    </div>
  );
}

  page:{fontFamily:"'Noto Sans TC','PingFang TC',sans-serif",backgroundColor:"#FBF8F5",minHeight:"100vh"},
  header:{backgroundColor:"#fff",borderBottom:"1px solid #EDE8E3",position:"sticky",top:0,zIndex:100,boxShadow:"0 2px 8px rgba(0,0,0,0.04)"},
  hInner:{maxWidth:760,margin:"0 auto",padding:"12px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",gap:10,flexWrap:"wrap"},
  title:{margin:0,fontSize:18,color:"#4A3728",fontWeight:700},
